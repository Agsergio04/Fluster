services:

  # ─── Backend ──────────────────────────────────────────────────
  - type: web
    name: fluster-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Activa el modo producción: enmascara los errores 500 y exige un
      # JWT_SECRET real (fail-fast del arranque si falta o es de ejemplo).
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Origen permitido para CORS en producción (URL del frontend).
      - key: CORS_ORIGIN
        sync: false

  # ─── Frontend ─────────────────────────────────────────────────
  - type: static
    name: fluster-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
