# ─────────────────────────────────────────────────────────────────
# Security — Análisis de vulnerabilidades con Trivy
#
# Workflow EXTRA (no obligatorio para la rúbrica) que refuerza el
# criterio de buenas prácticas de CI/CD.
#
# Escanea el sistema de ficheros del repositorio (dependencias npm y
# configuraciones / IaC) en busca de vulnerabilidades conocidas y publica
# los resultados en formato SARIF en la pestaña Security del repositorio.
#
# Además, el escaneo FALLA el workflow (exit-code: 1) si encuentra
# vulnerabilidades HIGH/CRITICAL con corrección disponible (ignore-unfixed),
# de modo que un PR no pueda mezclarse arrastrando un fallo conocido y
# subsanable. Trivy escribe primero el SARIF y solo después sale con error,
# así que el informe se sube igualmente (pasos con `if: always()`).
# ─────────────────────────────────────────────────────────────────

name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '23 4 * * 1'   # lunes a las 04:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy:
    name: Trivy — Escaneo del repositorio
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Escanear filesystem e IaC
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true
          scanners: vuln,misconfig
          # Falla el job ante HIGH/CRITICAL subsanables; el SARIF ya se ha escrito
          # antes de salir, así que los pasos `if: always()` siguientes lo publican.
          exit-code: '1'

      - name: Guardar informe Trivy como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 14

      - name: Publicar SARIF en GitHub Security
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem
