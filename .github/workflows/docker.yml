name: Docker

on:
  push:
    branches: [main]

jobs:
  build-push-backend:
    name: Build & Push — Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fluster-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fluster-backend:${{ github.sha }}

  build-push-frontend:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fluster-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fluster-frontend:${{ github.sha }}
