version: 2
updates:
  # Dependencias npm del backend
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(backend)"
    labels:
      - "dependencias"
      - "backend"

  # Dependencias npm del frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(frontend)"
    labels:
      - "dependencias"
      - "frontend"

  # Acciones usadas en los workflows de CI/CD
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencias"
      - "ci"
