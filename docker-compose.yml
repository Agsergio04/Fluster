services:

  # ─── Base de datos (Mongo local, NO el cluster Atlas) ─────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: fluster
    volumes:
      - mongo_data:/data/db
    networks:
      - fluster-net
    # Permite que los servicios dependientes esperen a que Mongo acepte conexiones
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Seed (one-shot) ──────────────────────────────────────────
  # Siembra la base de datos local con el admin y los datos de demostración.
  # Se ejecuta una vez (no se reinicia) cuando Mongo está listo; el backend
  # espera a que termine con éxito antes de arrancar.
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "npm run seed && npm run seed:datos"]
    environment:
      MONGO_URI: mongodb://mongo:27017/fluster
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - fluster-net
    restart: "no"

  # ─── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Apunta SIEMPRE a la Mongo local sembrada por el servicio 'seed',
      # no al cluster Atlas (el despliegue en la nube usa render.yaml).
      MONGO_URI:  mongodb://mongo:27017/fluster
      PORT:       3000
      JWT_SECRET: ${JWT_SECRET:-cambia_esto_por_un_secreto_seguro}
    depends_on:
      mongo:
        condition: service_healthy
      # Arranca solo cuando la siembra ha terminado correctamente
      seed:
        condition: service_completed_successfully
    # Healthcheck contra /health para que el frontend espere a que esté listo
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fluster-net

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relativo: las llamadas a /api las proxya nginx hacia el backend
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fluster-net


# ─── Volúmenes ────────────────────────────────────────────────
volumes:
  mongo_data:


# ─── Red interna ──────────────────────────────────────────────
networks:
  fluster-net:
    driver: bridge
