<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-fluster.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fluster — Gestiona los costes de Demurrage y Detention de contenedores marítimos. Controla el ciclo de vida de cada contenedor y actúa antes de que los costes se disparen." />
    <title>Fluster</title>

    <!-- Fuentes: preconnect adelanta la negociación TLS; preload + onload
         carga la hoja de fuentes de forma NO bloqueante para que no retrase
         el FCP/LCP. El <noscript> sirve de fallback cuando JS está deshabilitado. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" />
    </noscript>

    <!-- API: preconnect para reducir latencia en la primera llamada al backend -->
    <link rel="preconnect" href="https://fluster-vd09.onrender.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
