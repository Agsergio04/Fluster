<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-fluster.svg?v=2" />
    <link rel="icon" type="image/png" href="/favicon-fluster.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fluster — Gestiona los costes de Demurrage y Detention de contenedores marítimos. Controla el ciclo de vida de cada contenedor y actúa antes de que los costes se disparen." />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Fluster" />
    <meta property="og:title"       content="Fluster | Gestión de contenedores marítimos" />
    <meta property="og:description" content="Gestiona los costes de Demurrage y Detention de contenedores marítimos. Controla el ciclo de vida de cada contenedor y actúa antes de que los costes se disparen." />
    <meta property="og:url"          content="https://fluster-frontend.onrender.com" />
    <meta property="og:image"        content="https://fluster-frontend.onrender.com/og-image.svg" />
    <meta property="og:image:width"  content="343" />
    <meta property="og:image:height" content="343" />
    <meta property="og:image:alt"    content="Logo de Fluster" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Fluster | Gestión de contenedores marítimos" />
    <meta name="twitter:description" content="Gestiona los costes de Demurrage y Detention de contenedores marítimos." />
    <meta name="twitter:image"       content="https://fluster-frontend.onrender.com/og-image.svg" />
    <title>Fluster</title>

    <!-- Fuentes: preconnect adelanta la negociación TLS; preload + onload
         carga la hoja de fuentes de forma NO bloqueante para que no retrase
         el FCP/LCP. El <noscript> sirve de fallback cuando JS está deshabilitado. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Arimo:wght@400;500;600;700&display=optional"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Arimo:wght@400;500;600;700&display=optional" />
    </noscript>

    <!-- API: preconnect para reducir latencia en la primera llamada al backend -->
    <link rel="preconnect" href="https://fluster-vd09.onrender.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
